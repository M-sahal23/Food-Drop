{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Email Sent</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f5f5f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .done-card { background: #fff; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.09); padding: 40px 36px; width: 100%; max-width: 420px; text-align: center; }
    .done-icon { font-size: 3rem; margin-bottom: 16px; }
    h2 { font-size: 1.4rem; font-weight: 700; margin-bottom: 10px; }
    p { color: #666; font-size: 0.9rem; line-height: 1.6; }
    .tip { background: #fff8e1; border-left: 3px solid #f4a261; border-radius: 0 8px 8px 0; padding: 12px 16px; font-size: 0.85rem; color: #7a4f00; margin-top: 20px; text-align: left; }
    .back-link { margin-top: 24px; }
    .back-link a { color: #e63946; text-decoration: none; font-size: 0.875rem; font-weight: 600; }
  </style>
</head>
<body>
  <div class="done-card">
    <div class="done-icon">📬</div>
    <h2>Check your inbox!</h2>
    <p>We've sent a password reset link to your email address. Click the link in the email to set a new password.</p>

    <div class="tip">
      💡 Didn't get the email? Check your spam folder or make sure the email address you entered is correct.
    </div>

    <div class="back-link">
      <a href="{% url 'login' %}">← Back to login</a>
    </div>
  </div>
</body>
</html>
