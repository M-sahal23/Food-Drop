{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Password Reset Complete</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f5f5f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .complete-card { background: #fff; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.09); padding: 40px 36px; width: 100%; max-width: 420px; text-align: center; }
    .complete-icon { font-size: 3.5rem; margin-bottom: 16px; }
    h2 { font-size: 1.4rem; font-weight: 700; margin-bottom: 10px; }
    p { color: #666; font-size: 0.9rem; }
    .btn-login { background: #e63946; color: #fff; border: none; border-radius: 10px; padding: 12px 36px; font-size: 1rem; font-weight: 600; text-decoration: none; display: inline-block; margin-top: 20px; transition: background 0.2s; }
    .btn-login:hover { background: #c1121f; color: #fff; }
  </style>
</head>
<body>
  <div class="complete-card">
    <div class="complete-icon">✅</div>
    <h2>Password changed!</h2>
    <p>Your password has been set successfully. You can now log in with your new password.</p>
    <a href="{% url 'login' %}" class="btn-login">Go to Login</a>
  </div>
</body>
</html>
