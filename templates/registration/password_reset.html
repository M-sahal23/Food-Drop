{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Forgot Password</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f5f5f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .reset-card { background: #fff; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.09); padding: 40px 36px; width: 100%; max-width: 420px; }
    .reset-icon { font-size: 2.5rem; text-align: center; margin-bottom: 12px; }
    h2 { font-size: 1.4rem; font-weight: 700; text-align: center; margin-bottom: 6px; }
    p.sub { text-align: center; color: #888; font-size: 0.875rem; margin-bottom: 24px; }
    .form-control { border-radius: 10px; padding: 11px 14px; font-size: 0.9rem; }
    .form-control:focus { border-color: #e63946; box-shadow: 0 0 0 3px rgba(230,57,70,0.12); }
    .btn-reset { background: #e63946; color: #fff; border: none; border-radius: 10px; width: 100%; padding: 12px; font-size: 1rem; font-weight: 600; transition: background 0.2s; }
    .btn-reset:hover { background: #c1121f; color: #fff; }
    .back-link { text-align: center; margin-top: 18px; font-size: 0.875rem; }
    .back-link a { color: #e63946; text-decoration: none; }
  </style>
</head>
<body>
  <div class="reset-card">
    <div class="reset-icon">🔐</div>
    <h2>Forgot your password?</h2>
    <p class="sub">Enter your email and we'll send you a reset link.</p>

    <form method="POST">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label fw-semibold" style="font-size:.875rem;">Email address</label>
        <input
          type="email"
          name="email"
          class="form-control"
          placeholder="you@example.com"
          required
          autofocus
        >
      </div>
      <button type="submit" class="btn btn-reset">Send Reset Link</button>
    </form>

    <div class="back-link">
      <a href="{% url 'login' %}">← Back to login</a>
    </div>
  </div>
</body>
</html>
